{% extends "base.html" %}

{% block content %}
<div class="error-container fade-in">
    <div class="card" style="text-align: center;">
        <h1 style="color: var(--accent); font-size: 4rem;">!</h1>
        <h2>Vault Access Error</h2>
        <p>{{ message or "An unexpected error occurred in the encryption process." }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">Return to Safety</a>
    </div>
</div>

<style>
    .error-container {
        max-width: 500px;
        margin: 100px auto;
    }
</style>
{% endblock %}
